<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器控制台测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>浏览器控制台测试</h1>
        <p>请打开浏览器控制台（F12）查看错误信息</p>
        <button id="testBtn" class="btn btn-primary">测试文件上传</button>
    </div>

    <script>
        console.log('测试脚本加载成功');
        
        // 模拟文件上传测试
        document.getElementById('testBtn').addEventListener('click', function() {
            console.log('开始测试文件上传...');
            
            // 测试parseCSVLine函数
            try {
                console.log('测试parseCSVLine函数...');
                const testLine = '时间,ACU设置时间,时间差参考';
                const result = parseCSVLine(testLine, ',');
                console.log('parseCSVLine结果:', result);
            } catch (error) {
                console.error('parseCSVLine函数错误:', error);
            }
            
            // 测试isTimeValue函数
            try {
                console.log('测试isTimeValue函数...');
                const testTime = '2026_02_19_22_10_07_469';
                const result = isTimeValue(testTime);
                console.log('isTimeValue结果:', result);
            } catch (error) {
                console.error('isTimeValue函数错误:', error);
            }
            
            // 测试hasTimeRelatedText函数
            try {
                console.log('测试hasTimeRelatedText函数...');
                const testText = '时间';
                const result = hasTimeRelatedText(testText);
                console.log('hasTimeRelatedText结果:', result);
            } catch (error) {
                console.error('hasTimeRelatedText函数错误:', error);
            }
            
            console.log('测试完成');
        });
    </script>
    
    <!-- 引入main.js -->
    <script src="./src/main.js"></script>
</body>
</html>
